packages:
    - .
    - docs
allowBuilds:
    '@humanspeak/docs-kit@https://codeload.github.com/humanspeak/docs-kit/tar.gz/a474a0725babdda6f267951a578d14289037b0cc': true
    # pnpm 11 matches git-hosted dependencies by package name and resolved URL.
    # Refresh this commit when the docs-kit tag in docs/package.json changes.
    '@sentry/cli': true
    esbuild: true
    sharp: true
    workerd: true
minimumReleaseAge: 2880
minimumReleaseAgeExclude:
    - '@humanspeak/*'
