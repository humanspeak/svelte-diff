# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
    version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
    sources:
        - id: trunk
          ref: v1.10.2
          uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
    enabled:
        - go@1.21.0
        - python@3.14.4
        - node@24.15.0
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
    ignore:
        - linters: [ALL]
          paths:
              - '**/worker-configuration.d.ts'
              - convex/_generated/**
        - linters: [eslint]
          paths:
              # Vendored shadcn-svelte components (no-useless-assignment
              # false-positives on Svelte 5 `$bindable` prop defaults)
              - docs/src/lib/shadcn/**
        - linters: [osv-scanner]
          paths:
              - '**/pnpm-lock.yaml'
        - linters: [markdownlint]
          paths:
              - .changeset/**
    definitions:
        - name: prettier
          files:
              - typescript
              - svelte
              - yaml
              - css
              - postcss
              - sass
              - html
              - markdown
              - json
              - javascript
              - graphql
              - prettier_supported_configs
        - name: eslint
          files:
              - typescript
              - svelte
              - javascript
    enabled:
        - grype@0.116.0
        - sort-package-json@4.0.0
        - actionlint@1.7.12
        - checkov@3.3.8
        - eslint@10.7.0
        - git-diff-check
        - markdownlint@0.49.1
        - osv-scanner@2.4.0
        - oxipng@10.1.1
        - prettier@3.9.5
        - shellcheck@0.11.0
        - shfmt@3.6.0
        - svgo@4.0.2
        - taplo@0.10.0
        - trufflehog@3.95.9
        - yamllint@1.38.0
actions:
    disabled:
        - trunk-announce
        - trunk-check-pre-push
        - trunk-fmt-pre-commit
        - trunk-upgrade-available
